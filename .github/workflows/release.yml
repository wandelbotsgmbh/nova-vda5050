name: Release to GitHub Packages

on:
  push:
    branches: [main]
    paths: ["src/**", "pyproject.toml"]
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        working-directory: nova-vda5050
        run: |
          python -m pip install build
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: nova-vda5050/dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: github-packages
    permissions:
      packages: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        run: pip install twine

      - name: Publish to GitHub Packages
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          twine upload \
            --repository-url https://upload.pypi.pkg.github.com/wandelbotsgmbh/ \
            dist/*
